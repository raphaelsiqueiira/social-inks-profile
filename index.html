<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  <title>Frontend Mentor | Social links profile</title>
  <link rel="stylesheet" href="src/dist/style.css ">

</head>

<body>

  <main class="card">
    <article class="card__container">
      <picture class="card__img">
        <img src="assets/images/avatar-jessica.jpeg" alt="Jessica Randall">
      </picture>
      <section class="card_author_info">
        <h1 class="card__author">Jessica Randall</h1>
        <span class="card__author-address">London, United Kingdom</span>
      </section>
      <p class="card__bio">"Front-end developer and avid reader."</p>
      <nav class="card__links-container">
        <ul class="card-links">
          <li><a class="card__link" href="https://github.com/">GitHub</a></li>
          <li><a class="card__link" href="https://www.frontendmentor.io/home">Frontend Mentor</a></li>
          <li><a class="card__link" href="https://www.linkedin.com/feed/">LinkedIn</a></li>
          <li><a class="card__link" href="https://x.com">Twitter</a></li>
          <li><a class="card__link" href="https://www.instagram.com/">Instagram</a></li>
        </ul>
      </nav>
    </article>
  </main>


</body>

</html>
